location = /iaslab/compu2/A00405619/mjj-tarea {
  return 301 /iaslab/compu2/A00405619/mjj-tarea/;
}

location /iaslab/compu2/A00405619/mjj-tarea/ {
  alias /home/computacion2/sites/A00405619/mjj-tarea/dist/;
  index index.html;
  try_files $uri $uri/ /iaslab/compu2/A00405619/mjj-tarea/index.html;
}

location /iaslab/compu2/A00405619/mjj-tarea-api/ {
  proxy_pass http://127.0.0.1:8085/auth/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}
